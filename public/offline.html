<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline – PrisJägaren</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f0fdf4;
        color: #1a2e1a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .icon {
        width: 80px;
        height: 80px;
        background: #16a34a;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 40px;
      }
      h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; color: #16a34a; }
      p { font-size: 1rem; color: #4b5563; line-height: 1.6; max-width: 320px; }
      .badge {
        margin-top: 32px;
        display: inline-block;
        background: #dcfce7;
        color: #15803d;
        border-radius: 100px;
        padding: 6px 16px;
        font-size: 0.85rem;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="icon">🏷️</div>
    <h1>PrisJägaren</h1>
    <p>Du är offline — PrisJägaren uppdaterar priserna automatiskt när du är online igen.</p>
    <span class="badge">📡 Väntar på anslutning…</span>
  </body>
</html>
